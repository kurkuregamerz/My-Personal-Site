<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loader</title>
    <style>
      #loader {
        height: 10vmax;
        width: 10vmax;
        border-radius: 100%;
        border: 2vmax solid rgba(204, 204, 204, 0.329);
        border-bottom: 2vmax solid rgba(255, 94, 0, 0.863);
        animation-name: loader_animation;
        animation-duration: 2s;
        animation-iteration-count: infinite;
        animation-delay: 0s;
        animation-timing-function: linear;
      }
      @keyframes loader_animation {
        from {
          transform: rotateZ(0deg);
        }
        to {
          transform: rotateZ(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loader">
        
    </div>
  </body>
</html>
